<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(45deg, red, blue);
            background-size: 300% 300%;
            animation: backgroundAnimation 8s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }
        @keyframes backgroundAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            width: 300px;
            position: relative;
            z-index: 1;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, red, blue);
            background-size: 300% 300%;
            animation: borderAnimation 8s ease infinite;
            z-index: -1;
        }
        @keyframes borderAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        h1 {
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: rgba(255, 0, 0, 0.8);
            border: none;
            border-radius: 4px;
            color: white;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: rgba(0, 0, 255, 0.8);
        }
        a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            transition: color 0.3s;
        }
        a:hover {
            color: white;
        }
         .password-container {
        position: relative;
    }
    input[type="password"] {
        width: 100%;
        padding: 10px;
        padding-right: 40px; /* Space for the eye icon */
        border: 1px solid lightgray;
        border-radius: 4px;
        box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
        box-sizing: border-box;
    }
    .eye-icon {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        transition: color 0.3s ease;
        color: white;
    }
    .eye-icon:hover {
        color: red;
    }
    </style>
</head>
<body>
    <div class="container">
        <h1>Login</h1>
        <form id="loginForm">
            <input type="text" id="username" name="username" placeholder="Username" required>
            <div class="input-container">
            <div class="password-container">
            <input type="password" id="password" name="password" placeholder="Password" required>
             <span class="eye-icon" id="togglePassword">&#128274;</span>
            </div>
             </div>
            <button type="submit">Login</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function (event) {
            event.preventDefault();
            window.location.href = 'tracker.html';
        });
    const passwordInput = document.getElementById('password');
    const togglePassword = document.getElementById('togglePassword');

    // Toggle password visibility
    togglePassword.addEventListener('click', function () {
        const inputType = passwordInput.getAttribute('type');
        if (inputType === 'password') {
            passwordInput.setAttribute('type', 'text');
            togglePassword.innerHTML = '&#128275;'; // Unlocked lock symbol
        } else {
            passwordInput.setAttribute('type', 'password');
            togglePassword.innerHTML = '&#128274;'; // Locked lock symbol
        }
    });
    </script>
<footer style="position: fixed; left: 0; bottom: 0; width: 100%; text-align: center; font-family: Arial, sans-serif; font-size: 14px; background: linear-gradient(to right, #ff4b5c, #007bff); border-top: 2px solid #333; padding: 10px 0; color: #fff;">
    <p style="margin: 0;">&copy; 2025 Godfrey T R | Expense Tracker | Contact: +91 93444 62238</p>
</footer>
</body>
</html>
