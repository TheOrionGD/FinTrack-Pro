<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTrack Pro - Login</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="container">
        <h1>FinTrack Pro</h1>
        <p class="subtitle">Secure Expense Management</p>
        <form id="loginForm">
            <input type="text" id="username" name="username" placeholder="Username" required autocomplete="username">
            <div class="input-container">
                <div class="password-container">
                    <input type="password" id="password" name="password" placeholder="Password" required autocomplete="current-password">
                    <span class="eye-icon" id="togglePassword" aria-label="Toggle password visibility" role="button">&#128274;</span>
                </div>
            </div>
            <button type="submit">Sign In</button>
        </form>
    </div>

    <footer class="main-footer">
        <p>&copy; 2025 Godfrey T R | Expense Tracker | Contact: +91 93444 62238</p>
    </footer>

    <script src="js/login.js"></script>
</body>
</html>
