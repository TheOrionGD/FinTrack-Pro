<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinTrack Pro - Expense Tracker</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="css/tracker.css">
</head>
<body>

  <header>FinTrack Pro</header>
  
  <div class="container" id="dashboard-capture-area">
    <!-- Metrics Section -->
    <div class="metrics-grid">
      <div class="metric-card">
        <div class="metric-icon">&#128181;</div>
        <div class="metric-info">
          <h3>Total Spent</h3>
          <p id="metric-total-spent">$0.00</p>
        </div>
      </div>
      <div class="metric-card">
        <div class="metric-icon">&#128393;</div>
        <div class="metric-info">
          <h3>Logged Expenses</h3>
          <p id="metric-total-items">0</p>
        </div>
      </div>
      <div class="metric-card" id="budget-kpi-card">
        <div class="metric-icon">&#128197;</div>
        <div class="metric-info">
          <h3>Remaining Budget</h3>
          <p id="metric-remaining-budget">$0.00</p>
        </div>
      </div>
      <div class="metric-card">
        <div class="metric-icon">&#128200;</div>
        <div class="metric-info">
          <h3>Top Category</h3>
          <p id="metric-top-category">-</p>
        </div>
      </div>
    </div>

    <!-- Category Visualizer Section -->
    <div class="visualizer-container">
      <div class="visualizer-header">
        <h3>Spending Breakdown</h3>
        <div class="budget-setting">
          <label for="budget-input">Monthly Budget: </label>
          <input type="number" id="budget-input" value="1000.00" step="50" min="0" placeholder="Set budget">
        </div>
      </div>
      <div class="progress-bars-grid" id="category-progress-bars">
        <!-- Progress bars will be injected dynamically by JS -->
      </div>
    </div>

    <!-- Expense input form -->
    <form id="expense-form">
      <input type="text" id="expense-name" placeholder="Expense Name" required autocomplete="off">
      <input type="number" id="expense-amount" placeholder="Expense Amount ($)" step="0.01" required>
      <input type="date" id="expense-date" required>
      <select id="expense-category" required>
        <option value="" disabled selected>Category</option>
        <option value="Food">Food</option>
        <option value="Transport">Transport</option>
        <option value="Entertainment">Entertainment</option>
        <option value="Other">Other</option>
      </select>
      <button type="submit">Add Expense</button>
    </form>

    <!-- Search & Filter panel -->
    <div class="filter-bar">
      <div class="search-wrapper">
        <span class="search-icon">&#128269;</span>
        <input type="text" id="search-input" placeholder="Search by name...">
      </div>
      <select id="filter-category">
        <option value="all">All Categories</option>
        <option value="Food">Food</option>
        <option value="Transport">Transport</option>
        <option value="Entertainment">Entertainment</option>
        <option value="Other">Other</option>
      </select>
      <select id="currency-select" class="currency-select">
        <option value="USD">USD ($)</option>
        <option value="EUR">EUR (€)</option>
        <option value="GBP">GBP (£)</option>
        <option value="INR">INR (₹)</option>
        <option value="JPY">JPY (¥)</option>
      </select>
    </div>

    <div class="table-wrapper">
      <table class="expense-list" id="expense-table">
        <thead>
          <tr>
            <th class="sortable-header" data-column="name" style="cursor: pointer; user-select: none;">
              Name <span class="sort-icon" id="sort-name">&#8597;</span>
            </th>
            <th class="sortable-header" data-column="amount" style="cursor: pointer; user-select: none;">
              Amount <span class="sort-icon" id="sort-amount">&#8597;</span>
            </th>
            <th class="sortable-header" data-column="date" style="cursor: pointer; user-select: none;">
              Date <span class="sort-icon" id="sort-date">&#8597;</span>
            </th>
            <th>Category</th>
            <th class="action-column">Actions</th>
          </tr>
        </thead>
        <tbody id="expense-body">
          <!-- Expenses will be dynamically added here -->
        </tbody>
      </table>
    </div>

    <div class="download-section">
      <button id="download-image" class="download-btn">
        <span>&#128248;</span> Download Report Image
      </button>
      <button id="export-csv" class="download-btn">
        <span>&#128196;</span> Export CSV Spreadsheet
      </button>
    </div>
  </div>

  <div class="loader-4" id="loader">
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="box3"></div>
  </div>

  <footer class="main-footer">
    <p>&copy; 2025 Godfrey T R | Expense Tracker | Contact: +91 93444 62238</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="js/tracker.js"></script>
</body>
</html>
